	<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZAMAN SONS - Dashboard</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #f4f6f9; }

  .header {
    background: linear-gradient(90deg, #00b140 0%, #008a30 100%);
    color: white;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header h2 { font-size: 18px; }
  .header .logo { font-size: 22px; font-weight: bold; }
  .header .logo span { color: #333; }

  .container {
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
  }

  .welcome {
    text-align: center;
    margin-bottom: 30px;
  }
  .welcome h3 { color: #333; }
  .welcome p { color: #666; font-size: 14px; }

  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
  }

  .btn {
    padding: 25px 10px;
    background: white;
    border: 2px solid #00b140;
    border-radius: 10px;
    text-align: center;
    font-size: 16px;
    font-weight: bold;
    color: #00b140;
    cursor: pointer;
    transition: 0.3s;
  }
  .btn:hover {
    background: #00b140;
    color: white;
    transform: translateY(-3px);
  }

  .btn.logout {
    border-color: #dc3545;
    color: #dc3545;
    grid-column: span 2;
  }
  .btn.logout:hover {
    background: #dc3545;
    color: white;
  }

  .footer { text-align: center; margin-top: 30px; font-size: 12px; color: #999; }
</style>
</head>
<body>

<div class="header">
<div class="logo">easy<span style="color:white;">paisa</span></div>
<h2>ZAMAN SONS Mardan</h2>
</div>

<div class="container">
<div class="welcome">
<h3>Welcome TO EasyPaisa Portal</h3>
</div>

<div class="btn-grid">
<button class="btn" onclick="goTo('slip.html')">1. Slip</button>
<button class="btn" onclick="goTo('history.html')">2. View History</button>
<button class="btn" onclick="goTo('settlement.html')">3. Print Settlement</button>
<button class="btn logout" onclick="logout()">4. Logout</button>
</div>

<div class="footer">2026 ZAMAN SONS | EasyPaisa Services dESigN_bY: ZOYA_X</div>
</div>

<script>
function logout(){
window.location = "index.html"; // wapas login page pe
}

</script>

</body>
</html>
