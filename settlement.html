<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Print Settlement - ZAMAN SONS</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { background: #f4f6f9; padding: 20px; }

.form-box { max-width: 400px; margin: 0 auto 20px; background: white; padding: 20px; border-radius: 8px; text-align: center; }
.btn { width: 100%; padding: 12px; background: #00b140; color: white; border: none; border-radius: 5px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 10px; }
.btn:hover { background: #008a30; }
.btn.grey { background: #6c757d; }

  /* THERMAL SETTLEMENT - FULL REPORT */
.settlement { width: 80mm; margin: 20px auto; background: white; padding: 2px; font-size: 11px; font-weight: 900; font-family: 'Arial', sans-serif; color: #000; }
.settlement.title { text-align: center; font-size: 15px; border: 2px solid #000; padding: 3px; font-weight: 900; margin-bottom: 2px; }
.settlement.date { text-align: center; font-size: 11px; border: 2px solid #000; border-top: none; padding: 2px; font-weight: 900; margin-bottom: 3px; }

.settlement table { width: 100%; border-collapse: collapse; border: 2px solid #000; margin-bottom: 5px; }
.settlement th { border: 1px solid #000; padding: 3px 1px; text-align: center; font-size: 11px; font-weight: 900; background: #ddd; }
.settlement td { border: 1px solid #000; padding: 2px 1px; font-size: 11px; font-weight: 900; }
.settlement.th-no { width: 10%; }
.settlement.th-rec { width: 40%; }
.settlement.th-pos { width: 15%; }
.settlement.th-amt { width: 35%; text-align: right; padding-right: 2px; }
.settlement.td-amt { text-align: right; padding-right: 2px; }
.settlement.total-row { border-top: 2px solid #000; font-size: 12px; }
.settlement.summary td { background: #f0f0f0; }
.settlement.sign { text-align: center; font-size: 14px; margin: 5px 0; border: 1px solid #000; padding: 10px; }

  @media print {
    body * { visibility: hidden; }
  .settlement,.settlement * { visibility: visible; }
  .settlement { position: absolute; left: 0; top: 0; width: 80mm; }
  .form-box { display: none; }
  }
</style>
</head>
<body>

<div class="form-box">
<h3 style="color:#00b140;">Daily Settlement</h3>
<p style="font-size:14px; color:#555;">Full Report with Summary</p>
<button class="btn" onclick="printSettlement()">Print Settlement</button>
<button class="btn grey" onclick="goDashboard()">Back to Dashboard</button>
</div>

<!-- Ye walahissa print hoga -->
<div class="settlement" id="printSettlement">
<div class="title">Satlement</div>
<div class="date" id="sDate"></div>

<!-- TABLE 1: Daily Transactions -->
<table>
<thead>
<tr>
<th class="th-no">No.</th>
<th class="th-rec">Recived</th>
<th class="th-pos">POS</th>
<th class="th-amt">Amount</th>
</tr>
</thead>
<tbody id="sBody"></tbody>
<tfoot id="sTotal"></tfoot>
</table>

<!-- TABLE 2: Summary -->
<table class="summary">
<tr><td>Total</td><td id="sumTotalSlips" style="text-align:center;"></td><td id="sumTotalAmt" class="td-amt" colspan="2"></td></tr>
<tr><td>Device Total</td><td style="text-align:center;">1</td><td id="sumDeviceAmt" class="td-amt" colspan="2"></td></tr>
<tr><td>Difference</td><td id="sumDiffSlips" style="text-align:center;"></td><td id="sumDiffAmt" class="td-amt" colspan="2"></td></tr>
<tr><td>Adjusted</td><td style="text-align:center;">0</td><td class="td-amt" colspan="2">0</td></tr>
</table>

<div class="sign">Sign:</div>

<!-- TABLE 3: POS Wise -->
<table id="posTable">
<thead><tr><thcolspan="4">POS WISE</th></tr></thead>
<tbody id="posBody"></tbody>
</table>

<!-- TABLE 4: Name Wise -->
<table id="nameTable">
<thead><tr><thcolspan="3">NAME WISE</th></tr></thead>
<tbody id="nameBody"></tbody>
<tfoot id="nameTotal"></tfoot>
</table>

</div>

<script>
function printSettlement(){
  let history = JSON.parse(localStorage.getItem("easypaisaHistory")) || [];
  let today = new Date();
  let options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
document.getElementById("sDate").innerText = today.toLocaleDateString('en-US', options);

  let todayStr = today.toLocaleDateString();
  let todayHistory = history.filter(item =>item.date.includes(todayStr));

  let tbody = document.getElementById("sBody");
  let total = 0;
tbody.innerHTML = "";

  if(todayHistory.length === 0){
tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No transactions today</td></tr>`;
  } else {
todayHistory.forEach((item, index) => {
      total += parseFloat(item.amount);
tbody.innerHTML += `
<tr>
<td style="text-align:center;">${index + 1}</td>
<td>${item.by.toUpperCase()}</td>
<td style="text-align:center;">${item.pos}</td>
<td class="td-amt">${item.amount}</td>
</tr>
      `;
    });
  }

  for(let i = todayHistory.length; i< 20; i++){ // 20 rows
tbody.innerHTML += `<tr><td style="text-align:center;">${i + 1}</td><td></td><td></td><td class="td-amt"></td></tr>`;
  }

document.getElementById("sTotal").innerHTML = `
<tr class="total-row">
<td colspan="3" style="text-align:right;">GRAND TOTAL:</td>
<td class="td-amt">${total}</td>
</tr>
  `;

  // SUMMARY
document.getElementById("sumTotalSlips").innerText = todayHistory.length;
document.getElementById("sumTotalAmt").innerText = total;
document.getElementById("sumDeviceAmt").innerText = total; // agar device alaghai to yahan change karo
document.getElementById("sumDiffSlips").innerText = todayHistory.length - 1;
document.getElementById("sumDiffAmt").innerText = total - total;

  // POS WISE
  let posTotals = {};
todayHistory.forEach(item => {
posTotals[item.pos] = (posTotals[item.pos] || 0) + parseFloat(item.amount);
  });
  let posBody = document.getElementById("posBody");
posBody.innerHTML = "";
  for(let i=1; i<=9; i++){ // FBR 1 to 9
    let amt = posTotals[i] || 0;
    let count = todayHistory.filter(x =>x.pos == i).length;
posBody.innerHTML += `<tr><td>FBR</td><td style="text-align:center;">${i}</td><td style="text-align:center;">${count}</td><td class="td-amt">${amt}</td></tr>`;
  }
posBody.innerHTML += `<tr><td>FBR</td><td>Unknown</td><td style="text-align:center;">0</td><td class="td-amt">0</td></tr>`;
posBody.innerHTML += `<tr class="total-row"><td colspan="2">Total</td><td style="text-align:center;">${todayHistory.length}</td><td class="td-amt">${total}</td></tr>`;

  // NAME WISE
  let nameTotals = {};
todayHistory.forEach(item => {
    let name = item.by.toUpperCase();
    if(!nameTotals[name]) nameTotals[name] = {count:0, amt:0};
nameTotals[name].count++;
nameTotals[name].amt += parseFloat(item.amount);
  });
  let nameBody = document.getElementById("nameBody");
nameBody.innerHTML = "";
  let names = ["AMIN","SHABIR","TALHA(H)","TALHA(CCTV)","TALHA","ZAHID (S)","M KHAN","SHEHZAD","HILAL","ZAHID (A)"];
names.forEach(name => {
    let data = nameTotals[name] || {count:0, amt:0};
nameBody.innerHTML += `<tr><td>${name}</td><td style="text-align:center;">${data.count}</td><td class="td-amt">${data.amt}</td></tr>`;
  });
document.getElementById("nameTotal").innerHTML = `<tr class="total-row"><td>Total</td><td style="text-align:center;">${todayHistory.length}</td><td class="td-amt">${total}</td></tr>`;

setTimeout(() => { window.print(); }, 300);
}

function goDashboard(){ window.location = "dashboard.html"; }
</script>

</body>
</html>
