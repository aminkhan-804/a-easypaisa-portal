<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyPaisa Slip - ZAMAN SONS</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: Arial, sans-serif; }
  body { background: #f4f6f9; padding: 20px; }

  .form-box {
    max-width: 400px;
    margin: 0 auto 20px;
    background: white;
    padding: 20px;
    border-radius: 8px;
  }
  .form-box input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
    font-size: 14px;
  }
  .btn {
    width: 100%;
    padding: 12px;
    background: #00b140;
    color: white;
    border: none;
    border-radius: 5px;
    font-weight: bold;
    font-size: 15px;
    cursor: pointer;
  }
  .btn:hover { background: #008a30; }
  .btn.back { background: #6c757d; margin-top: 8px; }

  /* THERMAL SLIP DESIGN */
  .slip {
    width: 80mm;
    margin: 20px auto;
    background: white;
    padding: 0;
    font-size: 14px;
    font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    color: #000;
    border: 2px solid #000;
  }
  .slip .center { text-align: center; font-weight: bold; }
  .slip .row { display: flex; border-bottom: 1px solid #000; padding: 3px 0; }
  .slip .label { width: 45%; font-weight: bold; }
  .slip .value { width: 55%; }
  .slip .sign { height: 40px; margin-top: 10px; border-bottom: 1px solid #000; }
  @media print {
    body * { visibility: hidden; }
    .slip, .slip * { visibility: visible; }
    .slip { position: absolute; left: 0; top: 0; border: none; }
    .form-box { display: none; }
  }
</style>
</head>
<body>

<div class="form-box">
<h3 style="text-align:center; color:#00b140; margin-bottom:10px;">New EasyPaisa Slip</h3>
<input type="text" id="to" placeholder="EASYPAlSA To" required>
<input type="text" id="by" placeholder="EASYPAlSA By" required>
<input type="text" id="pos" placeholder="POS NO" required>
<input type="text" id="jazz" placeholder="JAZZ CASH NO" value="981 711 012">
<input type="number" id="amount" placeholder="AMOUNT" required>
<button class="btn" onclick="saveAndPrint()">Save & Print Slip</button>
<button class="btn back" onclick="goDashboard()">Back to Dashboard</button>
</div>

<!-- Ye walahissa print hoga -->
<div class="slip" id="printSlip">
<div class="center">EASYPAISA SLIPS</div>
<div class="center" id="dateTime"></div>
<div class="center" id="slipNo">Slip NO: 0</div>
<div class="row"><div class="label">EASYPAlSA To</div><div class="value" id="pTo"></div></div>
<div class="row"><div class="label">EASYPAlSA BY</div><div class="value" id="pBy"></div></div>
<div class="row"><div class="label">POS NO</div><div class="value" id="pPos"></div></div>
<div class="row"><div class="label">JAZZ CASH</div><div class="value" id="pJazz">981 711 012</div></div>
<div class="row"><div class="label">AMOUNT</div><div class="value" id="pAmount"></div></div>
<div class="sign">SIGN:</div>
<div style="text-align:center; margin-top:5px; font-size:10px;">----- Thank You -----</div>
</div>

<script>
let slipCounter = localStorage.getItem("slipCounter") || 0;

function saveAndPrint(){
  let to = document.getElementById("to").value.toUpperCase();
  let by = document.getElementById("by").value.toUpperCase();
  let pos = document.getElementById("pos").value.toUpperCase();
  let jazz = document.getElementById("jazz").value;
  let amount = document.getElementById("amount").value;

  if(!to || !by || !pos || !amount){
    alert("Sab fields fill karo!");
    return;
  }

  // Date Time
  let now = new Date();
  let date = now.getDate() + "/" + (now.getMonth()+1) + "/" + now.getFullYear();
  let time = now.toLocaleTimeString('en-US', {hour: '2-digit', minute:'2-digit'});
document.getElementById("dateTime").innerText = date + " " + time;

  // Slip No
slipCounter++;
localStorage.setItem("slipCounter", slipCounter);
document.getElementById("slipNo").innerText = "Slip NO: " + slipCounter;

  // Values set
document.getElementById("pTo").innerText = to;
document.getElementById("pBy").innerText = by;
document.getElementById("pPos").innerText = pos;
document.getElementById("pJazz").innerText = jazz;
document.getElementById("pAmount").innerText = amount;

  // History me save karo
  let history = JSON.parse(localStorage.getItem("easypaisaHistory")) || [];
history.push({slipNo: slipCounter, date: now.toLocaleString(), to, by, pos, jazz, amount});
localStorage.setItem("easypaisaHistory", JSON.stringify(history));

  // Print
window.print();

  // PRINT KE BAAD FORM CLEAR KAR DO
setTimeout(() => {
document.getElementById("to").value = "";
document.getElementById("by").value = "";
document.getElementById("pos").value = "";
document.getElementById("amount").value = "";
document.getElementById("to").focus(); // cursor pehle box me chalajaye
  }, 1000); // 1 second baad clear hogataake print naruke
}


function goDashboard(){
window.location = "dashboard.html";
}
</script>

</body>
</html>
